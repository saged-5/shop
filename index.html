<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAGED | Elite Shopping Experience</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #111;
            --gold: #d4af37;
            --glass: rgba(255, 255, 255, 0.8);
            --shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        
        html, body {
            overflow-x: hidden; 
            width: 100%;
            position: relative;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #fff; color: var(--primary); }

        .top-bar { background: var(--primary); color: #fff; text-align: center; padding: 10px; font-size: 12px; letter-spacing: 1px; }

        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 6%; background: var(--glass); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #eee;
            flex-wrap: wrap;
        }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: 3px; text-decoration: none; color: #000; }
        .nav-links { display: flex; gap: 30px; font-weight: 600; font-size: 14px; text-transform: uppercase; }
        .nav-links a { text-decoration: none; color: #555; }
        .nav-links a:hover { color: var(--gold); }
        .cart-icon { cursor: pointer; position: relative; }

        .hero { 
            height: 60vh; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=1200');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; text-align: center;
            padding: 0 6%;
        }
        .hero h1 { font-size: 50px; margin: 0; letter-spacing: 5px; }
        .hero p { font-size: 18px; opacity: 0.8; }

        .section-header { padding: 60px 6% 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        .section-header h2 { font-size: 30px; margin: 0; text-transform: uppercase; }

        .categories { display: flex; gap: 15px; padding: 0 6% 40px; overflow-x: auto; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-chip { background: #f5f5f5; padding: 10px 25px; border-radius: 50px; white-space: nowrap; cursor: pointer; font-weight: 600; flex-shrink: 0; }
        .cat-chip:hover, .cat-chip.active { background: var(--primary); color: #fff; }

        .products-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; padding: 0 6% 80px; 
        }
        .product-card { background: #fff; border-radius: 20px; overflow: hidden; position: relative; }
        .product-card:hover { transform: translateY(-10px); box-shadow: var(--shadow); }
        .img-container { height: 350px; position: relative; overflow: hidden; background: #f9f9f9; cursor: pointer; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 15px; left: 15px; background: var(--gold); color: #fff; padding: 5px 12px; border-radius: 5px; font-size: 10px; font-weight: bold; }
        
        .product-info { padding: 20px; }
        .product-info h3 { margin: 0 0 10px; font-size: 18px; }
        .product-info .price { font-size: 20px; font-weight: 800; color: var(--primary); }
        
        .add-btn { 
            margin-top: 15px; width: 100%; padding: 15px; background: var(--primary); 
            color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer;
        }
        .add-btn:hover { background: var(--gold); }

        .loading { text-align: center; padding: 80px 6%; font-size: 18px; color: #888; }

        .stats { background: #f9f9f9; padding: 60px 6%; display: flex; justify-content: space-around; text-align: center; flex-wrap: wrap; gap: 30px; }
        .stat-item i { font-size: 30px; margin-bottom: 15px; color: var(--gold); }
        .stat-item h4 { margin: 5px 0; font-size: 20px; }

        footer { background: #111; color: #fff; padding: 80px 6% 40px; }
        .footer-content { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; margin-bottom: 50px; }
        .footer-col h4 { margin-bottom: 20px; color: var(--gold); }
        
        .social-links { display: flex; gap: 15px; margin-top: 20px; }
        .social-icon { 
            width: 50px; height: 50px; background: #222; display: flex; justify-content: center; 
            align-items: center; border-radius: 50%; color: #fff; text-decoration: none; font-size: 20px;
        }
        .social-icon:hover { background: var(--gold); transform: scale(1.1); }

        .demo-tag { text-align: center; padding-top: 40px; border-top: 1px solid #333; font-size: 12px; color: #666; }

        /* Cart Drawer */
        .cart-drawer {
            position: fixed; top: 0; right: -450px; width: 400px; height: 100%; 
            background: #fff; box-shadow: -10px 0 30px rgba(0,0,0,0.1); z-index: 2001; 
            transition: right 0.4s ease; display: flex; flex-direction: column;
        }
        .cart-drawer.open { right: 0; }
        .cart-header { padding: 25px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .cart-header h3 { margin: 0; font-size: 22px; }
        .close-cart { background: none; border: none; font-size: 24px; cursor: pointer; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-item { display: flex; gap: 15px; margin-bottom: 20px; }
        .cart-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; }
        .cart-item-info { flex: 1; }
        .cart-item-info h4 { margin: 0 0 5px; font-size: 16px; }
        .cart-item-info p { margin: 0; color: #666; }
        .qty-controls { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .qty-btn { width: 25px; height: 25px; border: 1px solid #ddd; background: #f9f9f9; cursor: pointer; }
        .cart-footer { padding: 25px; border-top: 1px solid #eee; }
        .cart-total { display: flex; justify-content: space-between; font-size: 18px; font-weight: 700; margin-bottom: 20px; }
        .checkout-btn { width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .checkout-btn:hover { background: var(--gold); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: none; }
        .overlay.show { display: block; }

        /* Quick View Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2002; display: none; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 20px; max-width: 800px; width: 90%; display: flex; gap: 30px; position: relative; }
        .modal-img { width: 50%; border-radius: 15px; }
        .close-modal { position: absolute; top: 15px; right: 20px; background: none; border: none; font-size: 28px; cursor: pointer; }

        @media (max-width: 768px) {
            .nav-links { display: none; } 
            .logo { font-size: 20px; }
            .hero h1 { font-size: 35px; letter-spacing: 2px; }
            .cart-drawer { width: 100%; right: -100%; }
            .modal-content { flex-direction: column; }
            .modal-img { width: 100%; }
            .products-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
